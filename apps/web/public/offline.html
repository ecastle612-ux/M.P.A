<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>M.P.A. Offline</title>
    <!-- UX-007 static fallback: light surface uses logo-dark, dark surface uses logo-light. -->
    <link rel="icon" href="/branding/logo-dark.png" type="image/png" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/branding/logo-light.png" type="image/png" media="(prefers-color-scheme: dark)" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f4f6;
        color: #12151a;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      main {
        max-width: 480px;
        text-align: center;
        padding: 24px;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        background: #fff;
      }
      h1 {
        margin-top: 0;
      }
      p {
        color: #4b5563;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0f1419;
          color: #f4f7f6;
        }
        main {
          border-color: #2a3530;
          background: #1a2420;
        }
        p {
          color: #a8b5b0;
        }
      }
      /* BR-002: house-only crop — never show baked-in PNG wordmark at small sizes. */
      .mpa-offline-mark {
        display: block;
        position: relative;
        width: 96px;
        height: 96px;
        margin: 0 auto 16px;
        overflow: hidden;
      }
      .mpa-offline-mark img {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 226px;
        height: 226px;
        max-width: none;
        transform: translate(-50%, -50%);
        object-fit: cover;
        object-position: 50% 39%;
      }
      .mpa-offline-name {
        margin: 0 0 8px;
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="mpa-offline-mark" aria-hidden="true">
        <picture>
          <source media="(prefers-color-scheme: dark)" srcset="/branding/logo-light.png" />
          <img src="/branding/logo-dark.png" alt="" />
        </picture>
      </span>
      <h1 class="mpa-offline-name">M.P.A.</h1>
      <p>You are offline. Reconnect to continue with My Property Assistant.</p>
    </main>
  </body>
</html>
