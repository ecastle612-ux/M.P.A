<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>M.P.A. Offline</title>
    <link rel="icon" href="/branding/logo-dark.png" type="image/png" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/branding/logo-light.png" type="image/png" media="(prefers-color-scheme: dark)" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f4f6;
        color: #12151a;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      main {
        max-width: 480px;
        text-align: center;
        padding: 24px;
        border: 1px solid #d1d5db;
        border-radius: 12px;
        background: #fff;
      }
      h1 {
        margin-top: 0;
      }
      p {
        color: #4b5563;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0f1419;
          color: #f4f7f6;
        }
        main {
          border-color: #2a3530;
          background: #1a2420;
        }
        p {
          color: #a8b5b0;
        }
      }
      .mpa-offline-logo {
        display: block;
        margin: 0 auto 20px;
        width: 160px;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <picture>
        <source media="(prefers-color-scheme: dark)" srcset="/branding/logo-light.png" />
        <img class="mpa-offline-logo" src="/branding/logo-dark.png" alt="M.P.A. My Property Assistant" />
      </picture>
      <h1>You are offline</h1>
      <p>M.P.A. is unavailable right now. Reconnect to continue.</p>
    </main>
  </body>
</html>
